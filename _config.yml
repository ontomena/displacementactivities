# Site settings
title: DisplacementActivities
description: Simon Bradley's sound, word and video work
url: "https://www.displacementactivities.org"

plugins:
  - jekyll-feed

# Build settings
markdown: kramdown
permalink: /:categories/:year/:month/:day/:title/

# Collections
collections:
  posts:
    output: true
    permalink: /:categories/:year/:month/:day/:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# Exclude from processing
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - example.md
